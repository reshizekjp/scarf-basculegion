<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ポケモンデータ｜シーズンM-3 シングル</title>
</head>
<body>
<style>
:root{
 --bg:#0e1420; --panel:#161f30; --panel2:#1c2740; --line:#26334e;
 --tx:#e8edf5; --mut:#8a97ab; --teal:#7fe7d2; --org:#e8945a; --yel:#e3c65a;
}
*{box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Yu Gothic",Meiryo,sans-serif;margin:0;padding:16px 12px 48px}
.wrap{max-width:840px;margin:0 auto}
a{color:var(--teal);text-decoration:none}
h1{font-size:clamp(17px,3vw,23px);font-weight:900;margin:0 0 4px}
h1 .gh{color:var(--teal)}
.sub{color:var(--mut);font-size:11.5px;margin:0 0 14px;line-height:1.7}
.back{display:inline-block;margin-bottom:12px;font-size:12.5px;color:var(--mut);border:1px solid var(--line);border-radius:8px;padding:6px 12px;background:var(--panel)}
#q{background:var(--panel);border:1px solid var(--line);color:var(--tx);border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;width:100%;max-width:380px;margin-bottom:12px}
.list{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px}
.list a{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12.5px;font-weight:700;color:var(--tx)}
.list a .rk{color:var(--mut);font-size:10px;font-weight:600;margin-right:5px}
.list a:hover{border-color:var(--teal)}
.pkhead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin:4px 0 12px}
.pkhead .name{font-size:22px;font-weight:900}
.pkhead .rk{color:var(--mut);font-size:12px}
.tchip{display:inline-block;border-radius:5px;padding:2px 9px;font-size:11px;font-weight:800;background:var(--panel2);color:#9fb3d6}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-bottom:10px}
.sec{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.sec h2{font-size:11px;color:var(--mut);letter-spacing:.12em;margin:0 0 8px;font-weight:800}
.row{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;padding:2.5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.row:last-child{border-bottom:none}
.row .n{font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .v{color:var(--mut);font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0}
.row .n.scarf{color:var(--org)} .row .n.sash{color:var(--yel)}
table.bs{border-collapse:collapse;width:100%;font-variant-numeric:tabular-nums}
table.bs td,table.bs th{font-size:12px;padding:3px 6px;text-align:right;border-bottom:1px solid rgba(255,255,255,.05)}
table.bs th{color:var(--mut);font-weight:700;text-align:left}
table.sp{border-collapse:collapse;width:100%;font-variant-numeric:tabular-nums}
table.sp th{color:var(--mut);font-size:10px;font-weight:700;padding:3px 4px;text-align:right}
table.sp td{font-size:11.5px;padding:3px 4px;text-align:right;border-top:1px solid rgba(255,255,255,.05)}
table.sp td:first-child,table.sp th:first-child{text-align:left;color:var(--mut)}
.partners{display:flex;flex-wrap:wrap;gap:6px}
.partners a{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--tx)}
.partners a:hover{border-color:var(--teal)}
.partners .rk{color:var(--mut);font-size:10px;margin-right:4px}
footer{color:var(--mut);font-size:11px;line-height:1.8;margin-top:16px}
</style>

  ? d.partners.map((p,i)=> p[1] && D[p[1]]
     ? '<a href="#'+p[1]+'"><span class="rk">'+(i+1)+'</span>'+esc(p[0])+'</a>'
     : '<a><span class="rk">'+(i+1)+'</span>'+esc(p[0])+'</a>').join('')
  : '<span style="color:#3d4c66;font-size:12px">データなし</span>';
 document.getElementById('content').innerHTML =
  '<div class="pkhead"><span class="name">'+d.jp+'</span><span class="rk">使用率 #'+d.rank+'</span>'
  +d.types.map(t=>'<span class="tchip">'+t+'</span>').join(' ')+'</div>'
  +'<div class="grid">'
  +'<div class="sec"><h2>種族値（合計 '+total+'）</h2><table class="bs">'+bsRows+'</table></div>'
  +'<div class="sec"><h2>わざ 使用率</h2>'+listRows(d.moves)+'</div>'
  +'<div class="sec"><h2>もちもの</h2>'+listRows(d.items, true)+'</div>'
  +'<div class="sec"><h2>とくせい</h2>'+listRows(d.abilities)+'<h2 style="margin-top:12px">せいかく</h2>'+listRows(d.natures)+'</div>'
  +'</div>'
  +'<div class="sec" style="margin-bottom:10px"><h2>能力ポイント 人気配分ランキング</h2><div style="overflow-x:auto"><table class="sp">'+spHead+spRows+'</table></div></div>'
  +'<div class="sec"><h2>同じチームによくいるポケモン</h2><div class="partners">'+pt+'</div></div>';
 window.scrollTo(0,0);
}
function route(){
 const h = decodeURIComponent(location.hash.replace('#',''));
 if(h && D[h]) renderDetail(h); else renderIndex('');
}
window.addEventListener('hashchange', route);
route();
</script>
